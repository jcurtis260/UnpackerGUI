services:
  web:
    image: node:20-alpine
    container_name: unpackerr-gui-webeditor
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATA_DIR: /data
      BIN_DIR: /data/bin
      UNPACKERR_BINARY_PATH: /data/bin/unpackerr
      UNPACKERR_CONFIG_PATH: /data/config/unpackerr.conf
      UNPACKERR_LOG_PATH: /data/logs/unpackerr.log
      DOWNLOADS_PATH: /downloads
      APP_REPO: https://github.com/jcurtis260/UnpackerGUI.git
      APP_REF: main
    volumes:
      - unpackerr_data:/data
      - unpackerr_app:/opt/app
      - /Volume2/Media/downloads:/downloads
    command: >
      sh -c "
      set -e;
      apk add --no-cache git;
      mkdir -p /opt/app;
      if [ ! -d /opt/app/.git ]; then
        git clone --branch \"$APP_REF\" --single-branch \"$APP_REPO\" /opt/app;
      fi;
      cd /opt/app;
      git fetch origin \"$APP_REF\";
      git checkout \"$APP_REF\";
      git reset --hard \"origin/$APP_REF\";
      npm install;
      npm run build;
      cd backend;
      npm install --omit=dev;
      cd /opt/app;
      node backend/dist/server.js
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  unpackerr_data:
  unpackerr_app:
