services:
  web:
    image: node:20-alpine
    container_name: unpackerr-gui-webeditor
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATA_DIR: /data
      BIN_DIR: /data/bin
      UNPACKERR_BINARY_PATH: /data/bin/unpackerr
      UNPACKERR_CONFIG_PATH: /data/config/unpackerr.conf
      UNPACKERR_LOG_PATH: /data/logs/unpackerr.log
      DOWNLOADS_PATH: /downloads
      APP_REPO: https://github.com/jcurtis260/UnpackerGUI.git
      APP_REF: main
    volumes:
      - unpackerr_data:/data
      - unpackerr_app:/opt/app
      - /Volume2/Media/downloads:/downloads
    command: >
      sh -c "
      set -e;
      apk add --no-cache git;
      mkdir -p /opt/app;
      if [ ! -d /opt/app/.git ]; then
        git clone --branch \"$$APP_REF\" --single-branch \"$$APP_REPO\" /opt/app;
      fi;
      cd /opt/app;
      git fetch origin \"$$APP_REF\";
      git checkout \"$$APP_REF\";
      git reset --hard \"origin/$$APP_REF\";
      export BUILD_COMMIT=$$(git rev-parse --short HEAD 2>/dev/null || echo unknown);
      export BUILD_TIME=$$(date -u +%Y-%m-%dT%H:%M:%SZ);
      npm install;
      npm run build;
      cd backend;
      npm install --omit=dev;
      cd /opt/app;
      node backend/dist/server.js
      "
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  unpackerr:
    image: ghcr.io/unpackerr/unpackerr:latest
    container_name: unpackerr
    restart: unless-stopped
    environment:
      UN_CONFIG_FILE: /data/config/unpackerr.conf
      UN_LOG_FILE: /data/logs/unpackerr.log
    volumes:
      - unpackerr_data:/data
      - /Volume2/Media/downloads:/downloads

volumes:
  unpackerr_data:
  unpackerr_app:
