services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: unpackerr-gui-web
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      PORT: 8080
      DATA_DIR: /data
      BIN_DIR: /data/bin
      UNPACKERR_BINARY_PATH: /data/bin/unpackerr
      UNPACKERR_CONFIG_PATH: /data/config/unpackerr.conf
      UNPACKERR_LOG_PATH: /data/logs/unpackerr.log
      # These are commonly needed in unpackerr configs.
      DOWNLOADS_PATH: /downloads
      MEDIA_PATH: /media
    volumes:
      - unpackerr_data:/data
      - ${HOST_DOWNLOADS_PATH:-./downloads}:/downloads
      - ${HOST_MEDIA_PATH:-./media}:/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  unpackerr_data:
